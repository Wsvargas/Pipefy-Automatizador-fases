<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #10213a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5875; }
      .boxTitle { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .boxText { font: 400 16px Arial, sans-serif; fill: #334155; }
      .small { font: 400 15px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #4f46e5; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="70" y="70" class="title">Pipefy Phase Automation Monitor — Architecture</text>
  <text x="70" y="105" class="subtitle">Pipefy + SQL Server + FastAPI monitoring workflow</text>

  <!-- Boxes -->
  <rect x="70" y="180" rx="24" ry="24" width="260" height="140" fill="#dbeafe" filter="url(#shadow)"/>
  <text x="100" y="225" class="boxTitle">1. Pipefy</text>
  <text x="100" y="255" class="boxText">Cards from operational phases</text>
  <text x="100" y="280" class="small">Z1 / Z2</text>
  <text x="100" y="305" class="small">GraphQL queries</text>

  <rect x="410" y="155" rx="24" ry="24" width="330" height="190" fill="#e0e7ff" filter="url(#shadow)"/>
  <text x="440" y="200" class="boxTitle">2. Core Validation Engine</text>
  <text x="440" y="230" class="boxText">Python + requests + pandas</text>
  <text x="440" y="260" class="small">• Reads chassis and date fields</text>
  <text x="440" y="285" class="small">• Normalizes values</text>
  <text x="440" y="310" class="small">• Applies business rules</text>

  <rect x="820" y="180" rx="24" ry="24" width="290" height="140" fill="#dcfce7" filter="url(#shadow)"/>
  <text x="850" y="225" class="boxTitle">3. SQL Server</text>
  <text x="850" y="255" class="boxText">Internal source of truth</text>
  <text x="850" y="280" class="small">pyodbc lookup by chassis</text>
  <text x="850" y="305" class="small">latest valid record</text>

  <rect x="1180" y="180" rx="24" ry="24" width="310" height="140" fill="#ede9fe" filter="url(#shadow)"/>
  <text x="1210" y="225" class="boxTitle">4. Pipefy Update</text>
  <text x="1210" y="255" class="boxText">GraphQL mutation</text>
  <text x="1210" y="280" class="small">mark fields when validation passes</text>
  <text x="1210" y="305" class="small">current phase only</text>

  <rect x="410" y="450" rx="24" ry="24" width="330" height="170" fill="#fef3c7" filter="url(#shadow)"/>
  <text x="440" y="495" class="boxTitle">5. CSV Outputs</text>
  <text x="440" y="525" class="boxText">Traceable validated results</text>
  <text x="440" y="555" class="small">results_z1.csv</text>
  <text x="440" y="580" class="small">results_z2.csv</text>

  <rect x="860" y="425" rx="24" ry="24" width="390" height="220" fill="#cffafe" filter="url(#shadow)"/>
  <text x="890" y="470" class="boxTitle">6. FastAPI Monitoring Layer</text>
  <text x="890" y="500" class="boxText">Operational visibility + manual trigger</text>
  <text x="890" y="530" class="small">• Dashboard</text>
  <text x="890" y="555" class="small">• /logs</text>
  <text x="890" y="580" class="small">• /results</text>
  <text x="890" y="605" class="small">• /run</text>
  <text x="890" y="630" class="small">• /csv/z1 and /csv/z2</text>

  <rect x="1290" y="455" rx="24" ry="24" width="220" height="160" fill="#fee2e2" filter="url(#shadow)"/>
  <text x="1320" y="500" class="boxTitle">7. Users</text>
  <text x="1320" y="530" class="boxText">Operations / Management</text>
  <text x="1320" y="560" class="small">monitor execution</text>
  <text x="1320" y="585" class="small">download results</text>

  <!-- Decision diamond -->
  <polygon points="915,360 995,430 915,500 835,430" fill="#fce7f3" filter="url(#shadow)"/>
  <text x="870" y="420" class="boxTitle" style="font-size:20px;">Date match</text>
  <text x="872" y="446" class="small">within range?</text>

  <!-- Arrows -->
  <path d="M330 250 L410 250" class="arrow"/>
  <path d="M740 250 L820 250" class="arrow"/>
  <path d="M965 320 L965 350" class="arrow"/>
  <path d="M1110 250 L1180 250" class="arrow"/>
  <path d="M995 430 L1180 250" class="arrow"/>
  <path d="M835 430 L740 520" class="arrow"/>
  <path d="M740 535 L860 535" class="arrow"/>
  <path d="M1250 535 L1290 535" class="arrow"/>
  <path d="M1180 320 L1180 380 L1250 380 L1250 455" class="arrow"/>

  <!-- Labels -->
  <text x="1020" y="360" class="small">Yes</text>
  <text x="770" y="470" class="small">No / log</text>

  <!-- Bottom note -->
  <rect x="70" y="735" rx="18" ry="18" width="1460" height="105" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="95" y="775" class="boxTitle" style="font-size:20px;">Why this matters</text>
  <text x="95" y="807" class="boxText">This architecture shows API integration, SQL validation, business-rule automation, result traceability, and a monitoring layer for operational execution.</text>
</svg>
